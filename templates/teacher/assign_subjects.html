{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Assign Subjects to Students</h2>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row">
            <div class="col-md-6">
                <h4>Select Students</h4>
                <div style="max-height: 300px; overflow-y: auto; border: 1px solid #ccc; padding: 10px;">
                    {% for student in students %}
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="student_ids" value="{{ student.user_id }}" id="s{{ student.user_id }}">
                        <label class="form-check-label" for="s{{ student.user_id }}">
                            {{ student.full_name }} ({{ student.user_id }})
                        </label>
                    </div>
                    {% endfor %}
                </div>
            </div>
            <div class="col-md-6">
                <h4>Select Subjects</h4>
                <div style="max-height: 300px; overflow-y: auto; border: 1px solid #ccc; padding: 10px;">
                    {% for subject in subjects %}
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="subject_ids" value="{{ subject.subject_id }}" id="sub{{ subject.subject_id }}">
                        <label class="form-check-label" for="sub{{ subject.subject_id }}">
                            {{ subject.subject_name }}
                        </label>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary mt-3">Assign Subjects</button>
    </form>
</div>
{% endblock %}
