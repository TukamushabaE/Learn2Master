{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Pending Student Registrations</h2>
    <table class="table">
        <thead>
            <tr>
                <th>Full Name</th>
                <th>Username</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.full_name }}</td>
                <td>{{ student.username }}</td>
                <td>{{ student.email }}</td>
                <td>
                    <form action="{{ url_for('teacher.approve_student', user_id=student.user_id) }}" method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="btn btn-success btn-sm">Approve</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="4">No pending students.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
