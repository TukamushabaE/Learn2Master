{% extends "base.html" %}
{% block content %}
<h2>Student Dashboard</h2>
<a href="{{ url_for('view_progress') }}" class="btn btn-outline-info mb-3">View My Progress Trail</a>
<div class="row">
    {% for subject in subjects %}
    <div class="col-md-4">
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">{{ subject.name }}</h5>
                <p class="card-text">Explore CBC learning pathways for {{ subject.name }}.</p>
                <a href="{{ url_for('view_subject', subject_id=subject.id) }}" class="btn btn-primary">Go to Subject</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
