{% extends "base.html" %}
{% block content %}
<h2>User Management</h2>
<table class="table">
    <thead>
        <tr>
            <th>Username</th>
            <th>Role</th>
            <th>School</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.role }}</td>
            <td>{{ user.school }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
