services:
  - type: web
    name: learn2master-cbc
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 app:app
    healthCheckPath: /health
    initialDeployHook: python manage.py seed-demo-data
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: learn2master-db
          property: connectionString
      - key: LEARN2MASTER_SECRET_KEY
        generateValue: true
      - key: LEARN2MASTER_DEBUG
        value: "0"
      - key: LEARN2MASTER_FORCE_HTTPS
        value: "0"
      - key: LEARN2MASTER_SESSION_COOKIE_SECURE
        value: "1"
      - key: LEARN2MASTER_CSRF_ENABLED
        value: "1"
      - key: LEARN2MASTER_MAX_UPLOAD_BYTES
        value: "110100480"
      - key: LEARN2MASTER_MAX_DOCUMENT_BYTES
        value: "104857600"
      - key: LEARN2MASTER_TEACHER_KB_LIMIT_BYTES
        value: "1073741824"
      - key: GUNICORN_TIMEOUT
        value: "120"
      - key: LEARN2MASTER_AUTO_SEED_DEMO
        value: "1"
      - key: LEARN2MASTER_SEED_LEARNER_PASSWORD
        sync: false
      - key: LEARN2MASTER_SEED_TEACHER_PASSWORD
        sync: false
      - key: LEARN2MASTER_SEED_SCHOOL_ADMIN_PASSWORD
        sync: false
      - key: LEARN2MASTER_SEED_SUPER_ADMIN_PASSWORD
        sync: false

databases:
  - name: learn2master-db
    plan: free
    region: oregon
    databaseName: learn2master
    user: learn2master
    postgresMajorVersion: "18"
