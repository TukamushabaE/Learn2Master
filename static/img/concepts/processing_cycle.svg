<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Information processing cycle</title>
  <desc id="desc">Input, processing, storage, output and communication form a cycle.</desc>
  <rect width="720" height="360" fill="#f8fbfa"/>
  <circle cx="360" cy="180" r="78" fill="#ffffff" stroke="#607080" stroke-width="3"/>
  <text x="360" y="173" text-anchor="middle" font-family="Inter,Arial" font-size="20" font-weight="700" fill="#26394f">ICT</text>
  <text x="360" y="200" text-anchor="middle" font-family="Inter,Arial" font-size="15" fill="#26394f">Processing Cycle</text>
  <g font-family="Inter,Arial" font-weight="700" font-size="16">
    <rect x="285" y="25" width="150" height="54" rx="10" fill="#dff3ff" stroke="#2a7fb8" stroke-width="2"/><text x="360" y="59" text-anchor="middle" fill="#17486a">Input</text>
    <rect x="520" y="133" width="150" height="54" rx="10" fill="#fff0d9" stroke="#d17b00" stroke-width="2"/><text x="595" y="167" text-anchor="middle" fill="#6f4200">Processing</text>
    <rect x="430" y="275" width="150" height="54" rx="10" fill="#e7f8e9" stroke="#2d8a48" stroke-width="2"/><text x="505" y="309" text-anchor="middle" fill="#175225">Storage</text>
    <rect x="140" y="275" width="150" height="54" rx="10" fill="#f5eaff" stroke="#7a4cc2" stroke-width="2"/><text x="215" y="309" text-anchor="middle" fill="#452675">Output</text>
    <rect x="50" y="133" width="160" height="54" rx="10" fill="#ffe8e6" stroke="#c04435" stroke-width="2"/><text x="130" y="167" text-anchor="middle" fill="#752017">Communication</text>
  </g>
  <path d="M392 82 C470 90 535 100 578 130" fill="none" stroke="#506070" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M588 190 C580 235 552 260 520 278" fill="none" stroke="#506070" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M424 303 H292" fill="none" stroke="#506070" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M198 276 C162 247 138 220 132 190" fill="none" stroke="#506070" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M145 132 C190 92 250 82 325 79" fill="none" stroke="#506070" stroke-width="4" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#506070"/></marker></defs>
</svg>
