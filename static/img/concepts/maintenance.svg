<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Handling and maintaining ICT tools</title>
  <desc id="desc">Care, cleaning, power protection and reporting faults maintain ICT tools.</desc>
  <rect width="720" height="360" fill="#fbfcff"/>
  <rect x="88" y="48" width="544" height="264" rx="18" fill="#ffffff" stroke="#7c8da0" stroke-width="3"/>
  <text x="360" y="89" text-anchor="middle" font-family="Inter,Arial" font-size="24" font-weight="800" fill="#26394f">Maintain ICT Tools</text>
  <g font-family="Inter,Arial" font-size="18" fill="#26394f">
    <text x="145" y="135">1. Carry equipment carefully</text>
    <text x="145" y="175">2. Keep devices dry and dust-free</text>
    <text x="145" y="215">3. Save work and shut down correctly</text>
    <text x="145" y="255">4. Report faults before using equipment</text>
  </g>
  <circle cx="112" cy="129" r="11" fill="#dff3ff" stroke="#2a7fb8" stroke-width="2"/>
  <circle cx="112" cy="169" r="11" fill="#fff0d9" stroke="#d17b00" stroke-width="2"/>
  <circle cx="112" cy="209" r="11" fill="#e8f8ed" stroke="#2d8a48" stroke-width="2"/>
  <circle cx="112" cy="249" r="11" fill="#f5eaff" stroke="#7a4cc2" stroke-width="2"/>
</svg>
