<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Data becomes information</title>
  <desc id="desc">Raw marks are processed into an average and interpreted as useful information.</desc>
  <rect width="720" height="360" fill="#fbfcff"/>
  <rect x="42" y="60" width="170" height="220" rx="12" fill="#fff7df" stroke="#c98700" stroke-width="3"/>
  <text x="127" y="96" text-anchor="middle" font-family="Inter,Arial" font-size="20" font-weight="700" fill="#6f4b00">Raw Data</text>
  <text x="127" y="137" text-anchor="middle" font-family="Inter,Arial" font-size="18" fill="#6f4b00">45</text>
  <text x="127" y="172" text-anchor="middle" font-family="Inter,Arial" font-size="18" fill="#6f4b00">60</text>
  <text x="127" y="207" text-anchor="middle" font-family="Inter,Arial" font-size="18" fill="#6f4b00">75</text>
  <text x="127" y="242" text-anchor="middle" font-family="Inter,Arial" font-size="14" fill="#6f4b00">marks without meaning</text>
  <circle cx="360" cy="170" r="75" fill="#e7f0ff" stroke="#2b65c8" stroke-width="3"/>
  <text x="360" y="158" text-anchor="middle" font-family="Inter,Arial" font-size="18" font-weight="700" fill="#173a78">Process</text>
  <text x="360" y="187" text-anchor="middle" font-family="Inter,Arial" font-size="16" fill="#173a78">sort, calculate, interpret</text>
  <rect x="508" y="84" width="170" height="172" rx="12" fill="#e8f8ed" stroke="#2c8c4a" stroke-width="3"/>
  <text x="593" y="121" text-anchor="middle" font-family="Inter,Arial" font-size="20" font-weight="700" fill="#185229">Information</text>
  <text x="593" y="164" text-anchor="middle" font-family="Inter,Arial" font-size="24" font-weight="700" fill="#185229">Average = 60</text>
  <text x="593" y="207" text-anchor="middle" font-family="Inter,Arial" font-size="14" fill="#185229">useful for a decision</text>
  <path d="M215 170 H282" stroke="#506070" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M438 170 H505" stroke="#506070" stroke-width="5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#506070"/></marker></defs>
</svg>
