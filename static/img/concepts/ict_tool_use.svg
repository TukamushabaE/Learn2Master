<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Using ICT tools for a task</title>
  <desc id="desc">A learner chooses, uses and reports with ICT tools.</desc>
  <rect width="720" height="360" fill="#f7fbff"/>
  <rect x="55" y="95" width="150" height="92" rx="12" fill="#dff3ff" stroke="#2a7fb8" stroke-width="3"/>
  <text x="130" y="132" text-anchor="middle" font-family="Inter,Arial" font-size="18" font-weight="800" fill="#17486a">Choose Tool</text>
  <text x="130" y="160" text-anchor="middle" font-family="Inter,Arial" font-size="13" fill="#17486a">task + purpose</text>
  <rect x="285" y="95" width="150" height="92" rx="12" fill="#fff0d9" stroke="#d17b00" stroke-width="3"/>
  <text x="360" y="132" text-anchor="middle" font-family="Inter,Arial" font-size="18" font-weight="800" fill="#6f4200">Use Safely</text>
  <text x="360" y="160" text-anchor="middle" font-family="Inter,Arial" font-size="13" fill="#6f4200">capture/process</text>
  <rect x="515" y="95" width="150" height="92" rx="12" fill="#e8f8ed" stroke="#2d8a48" stroke-width="3"/>
  <text x="590" y="132" text-anchor="middle" font-family="Inter,Arial" font-size="18" font-weight="800" fill="#175225">Produce Evidence</text>
  <text x="590" y="160" text-anchor="middle" font-family="Inter,Arial" font-size="13" fill="#175225">file, photo, report</text>
  <path d="M208 141 H280" stroke="#506070" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M438 141 H510" stroke="#506070" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="150" y="245" width="420" height="58" rx="15" fill="#ffffff" stroke="#7c8da0" stroke-width="2"/>
  <text x="360" y="281" text-anchor="middle" font-family="Inter,Arial" font-size="17" font-weight="800" fill="#26394f">Competence = selecting and using the right ICT tool for a real task</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#506070"/></marker></defs>
</svg>
