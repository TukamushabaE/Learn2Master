<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Common ICT tools</title>
  <desc id="desc">Examples of ICT tools for input, output, storage and communication.</desc>
  <rect width="720" height="360" fill="#f7fbff"/>
  <g font-family="Inter,Arial" fill="#26394f">
    <rect x="55" y="70" width="145" height="95" rx="12" fill="#dff3ff" stroke="#2a7fb8" stroke-width="3"/>
    <rect x="88" y="92" width="78" height="45" rx="4" fill="#fff" stroke="#2a7fb8" stroke-width="2"/><rect x="106" y="139" width="42" height="10" fill="#2a7fb8"/>
    <text x="127" y="195" text-anchor="middle" font-size="16" font-weight="700">Computer</text>
    <rect x="225" y="70" width="145" height="95" rx="12" fill="#fff0d9" stroke="#d17b00" stroke-width="3"/>
    <rect x="282" y="88" width="35" height="62" rx="8" fill="#fff" stroke="#d17b00" stroke-width="2"/><circle cx="300" cy="142" r="3" fill="#d17b00"/>
    <text x="297" y="195" text-anchor="middle" font-size="16" font-weight="700">Phone</text>
    <rect x="395" y="70" width="145" height="95" rx="12" fill="#e7f8e9" stroke="#2d8a48" stroke-width="3"/>
    <rect x="430" y="96" width="76" height="36" rx="5" fill="#fff" stroke="#2d8a48" stroke-width="2"/><rect x="443" y="132" width="50" height="15" fill="#2d8a48"/>
    <text x="467" y="195" text-anchor="middle" font-size="16" font-weight="700">Printer</text>
    <rect x="565" y="70" width="105" height="95" rx="12" fill="#f5eaff" stroke="#7a4cc2" stroke-width="3"/>
    <circle cx="618" cy="112" r="25" fill="#fff" stroke="#7a4cc2" stroke-width="2"/><circle cx="618" cy="112" r="9" fill="#7a4cc2"/>
    <text x="617" y="195" text-anchor="middle" font-size="16" font-weight="700">Camera</text>
    <rect x="130" y="240" width="460" height="62" rx="15" fill="#ffffff" stroke="#7c8da0" stroke-width="2"/>
    <text x="360" y="267" text-anchor="middle" font-size="17" font-weight="700">Tools are chosen by task</text>
    <text x="360" y="292" text-anchor="middle" font-size="15">capture, process, store, output or communicate information</text>
  </g>
</svg>
