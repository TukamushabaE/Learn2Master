<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Reading scales accurately</title>
  <desc id="desc">Eye level reading reduces parallax error.</desc>
  <rect width="720" height="360" fill="#fbfcff"/>
  <rect x="310" y="70" width="100" height="220" rx="16" fill="#dff3ff" stroke="#2a7fb8" stroke-width="3"/>
  <line x1="330" y1="95" x2="390" y2="95" stroke="#17486a" stroke-width="3"/>
  <line x1="330" y1="135" x2="390" y2="135" stroke="#17486a" stroke-width="3"/>
  <line x1="330" y1="175" x2="390" y2="175" stroke="#17486a" stroke-width="3"/>
  <line x1="330" y1="215" x2="390" y2="215" stroke="#17486a" stroke-width="3"/>
  <line x1="330" y1="255" x2="390" y2="255" stroke="#17486a" stroke-width="3"/>
  <path d="M330 190 Q360 172 390 190 V255 H330 Z" fill="#79c7ec" opacity="0.75"/>
  <circle cx="180" cy="190" r="28" fill="#fff0d9" stroke="#d17b00" stroke-width="3"/>
  <circle cx="180" cy="190" r="9" fill="#6f4200"/>
  <path d="M210 190 H310" stroke="#2d8a48" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="180" y="245" text-anchor="middle" font-family="Inter,Arial" font-size="17" font-weight="700" fill="#6f4200">eye level</text>
  <path d="M510 120 H412" stroke="#c04435" stroke-width="4" stroke-dasharray="8 8" marker-end="url(#bad)"/>
  <text x="545" y="124" font-family="Inter,Arial" font-size="16" font-weight="700" fill="#752017">wrong angle</text>
  <text x="360" y="325" text-anchor="middle" font-family="Inter,Arial" font-size="17" font-weight="800" fill="#26394f">Read at eye level and identify the smallest division.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#2d8a48"/></marker>
    <marker id="bad" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#c04435"/></marker>
  </defs>
</svg>
