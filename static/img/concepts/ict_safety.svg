<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">ICT safety checklist</title>
  <desc id="desc">Safety practices for computer laboratory and responsible ICT use.</desc>
  <rect width="720" height="360" fill="#f8fbfa"/>
  <rect x="78" y="40" width="564" height="280" rx="18" fill="#ffffff" stroke="#7c8da0" stroke-width="3"/>
  <text x="360" y="82" text-anchor="middle" font-family="Inter,Arial" font-size="24" font-weight="800" fill="#26394f">ICT Safety Checklist</text>
  <g font-family="Inter,Arial" font-size="18" fill="#26394f">
    <text x="150" y="128">✓ Keep liquids away from devices</text>
    <text x="150" y="170">✓ Sit correctly and reduce glare</text>
    <text x="150" y="212">✓ Protect passwords and personal data</text>
    <text x="150" y="254">✓ Report damaged cables or devices</text>
    <text x="150" y="296">✓ Shut down and handle equipment carefully</text>
  </g>
  <circle cx="112" cy="121" r="12" fill="#e8f8ed" stroke="#2d8a48" stroke-width="2"/>
  <circle cx="112" cy="163" r="12" fill="#e8f8ed" stroke="#2d8a48" stroke-width="2"/>
  <circle cx="112" cy="205" r="12" fill="#e8f8ed" stroke="#2d8a48" stroke-width="2"/>
  <circle cx="112" cy="247" r="12" fill="#e8f8ed" stroke="#2d8a48" stroke-width="2"/>
  <circle cx="112" cy="289" r="12" fill="#e8f8ed" stroke="#2d8a48" stroke-width="2"/>
</svg>
